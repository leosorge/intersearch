name: YouTube Interview Monitor

on:
  # Esegui ogni 6 ore (00:00, 06:00, 12:00, 18:00 UTC)
  schedule:
    - cron: "0 */6 * * *"

  # Permetti esecuzione manuale dalla tab Actions di GitHub
  workflow_dispatch:

jobs:
  search-and-publish:
    runs-on: ubuntu-latest

    # Permessi per committare output.html e pubblicare su GitHub Pages
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # 1. Checkout del repository
      - name: Checkout
        uses: actions/checkout@v5

      # 2. Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Installa dipendenze
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Esegui lo script di ricerca
      - name: Run search agent
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python search_agent.py

      # 5. Committa output.html nel repository
      #    (se non è cambiato nulla, git non crea un commit vuoto)
      - name: Commit output.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.html
          git diff --cached --quiet || git commit -m "chore: update output.html [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

